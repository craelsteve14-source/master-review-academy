<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0E2348" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MRA Review" />
    <meta name="application-name" content="MRA Review" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Master Review Academy</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      body { background: #F6F6F8; }

      @keyframes mraMascotBob { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(-1deg); } }
      @keyframes mraMascotWave { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-22deg); } 50% { transform: rotate(6deg); } 75% { transform: rotate(-14deg); } }
      @keyframes mraMascotPop { 0% { transform: scale(1) rotate(0deg); } 30% { transform: scale(1.16) rotate(-5deg); } 55% { transform: scale(0.94) rotate(4deg); } 75% { transform: scale(1.05) rotate(-2deg); } 100% { transform: scale(1) rotate(0deg); } }
      @keyframes mraMascotShake { 0%,100% { transform: translateX(0) rotate(0deg); } 20% { transform: translateX(-3px) rotate(-3deg); } 40% { transform: translateX(3px) rotate(3deg); } 60% { transform: translateX(-2px) rotate(-2deg); } 80% { transform: translateX(2px) rotate(2deg); } }
      @keyframes mraMascotSparkle { 0% { opacity: 0; transform: scale(0.4) translateY(0); } 40% { opacity: 1; } 100% { opacity: 0; transform: scale(1) translateY(-14px); } }
      @keyframes mraBubbleIn { 0% { opacity: 0; transform: translateY(6px) scale(0.94); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes mraSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes mraSplashIn { 0% { opacity: 0; scale: 0.82; } 100% { opacity: 1; scale: 1; } }
      @keyframes mraScreenIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }

      .mra-hover-lift { transition: transform .18s ease, box-shadow .18s ease; }
      @media (hover: hover) {
        .mra-hover-lift:hover { transform: translateY(-3px); box-shadow: 0 14px 26px -12px rgba(14,35,72,.24); }
      }
      .mra-hover-btn { transition: filter .15s ease, transform .1s ease; }
      @media (hover: hover) {
        .mra-hover-btn:hover { filter: brightness(1.08); }
      }
      .mra-hover-btn:active { transform: scale(0.97); }
      .mra-hover-navitem { transition: background-color .15s ease, color .15s ease; }
      @media (hover: hover) {
        .mra-hover-navitem:hover { background-color: rgba(240,186,72,.08); }
      }

      /* Replaces the browser's default square tap-highlight with a soft
         circular fade centered on whatever was tapped. */
      .mra-hover-lift, .mra-hover-btn, .mra-hover-navitem { position: relative; overflow: hidden; }
      .mra-hover-lift::after, .mra-hover-btn::after, .mra-hover-navitem::after {
        content: ""; position: absolute; inset: 0; border-radius: inherit;
        background: radial-gradient(circle, rgba(14,35,72,.16) 0%, rgba(14,35,72,0) 72%);
        opacity: 0; transform: scale(.6);
        transition: opacity .45s ease, transform .45s ease;
        pointer-events: none;
      }
      .mra-hover-lift:active::after, .mra-hover-btn:active::after, .mra-hover-navitem:active::after {
        opacity: 1; transform: scale(1.1);
        transition: opacity .05s ease, transform .05s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
